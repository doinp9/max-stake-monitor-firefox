<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      background: #0e0e0e;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 14px 18px;
      background: #016443;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 800;
      color: #FFDF00;
      letter-spacing: 0.5px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-toggle {
      display: flex;
      background: rgba(0,0,0,0.25);
      border-radius: 4px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 4px 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.4);
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: rgba(255,223,0,0.2);
      color: #FFDF00;
    }
    .count {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.25);
      padding: 4px 10px;
      border-radius: 4px;
    }
    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      background: #1a1a1a;
      border-bottom: 2px solid #016443;
    }
    .stat {
      text-align: center;
      padding: 14px 8px;
      border-right: 1px solid #2a2a2a;
    }
    .stat:last-child { border-right: none; }
    .stat .stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .stat .stat-value {
      font-size: 17px;
      font-weight: 800;
      color: #FFDF00;
    }
    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 18px;
      background: #141414;
      border-bottom: 1px solid #222;
    }
    .controls button {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }
    .controls button:hover { opacity: 0.85; }
    .controls .btn-primary { background: #016443; color: #fff; }
    .controls .btn-secondary { background: #2a2a2a; color: #ccc; }
    .controls .btn-danger { background: #3a1a1a; color: #e04040; }
    /* Log List — fixed height for 3 items with scroll */
    .log-list {
      height: 210px;
      overflow-y: auto;
      padding: 8px 10px;
      background: #0e0e0e;
    }
    .log-list::-webkit-scrollbar { width: 3px; }
    .log-list::-webkit-scrollbar-track { background: #111; }
    .log-list::-webkit-scrollbar-thumb { background: #016443; border-radius: 2px; }
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 4px;
      background: #1a1a1a;
      border-radius: 4px;
      border-left: 3px solid #333;
      transition: background 0.12s;
    }
    .log-item:hover { background: #222; }
    .log-item.high { border-left-color: #016443; }
    .log-item.mid { border-left-color: #FFDF00; }
    .log-item.low { border-left-color: #e04040; }
    .log-left { display: flex; flex-direction: column; gap: 3px; max-width: 190px; }
    .log-info { font-size: 12px; font-weight: 600; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-date { font-size: 10px; font-weight: 500; color: #666; }
    .log-right { text-align: right; }
    .log-ms { font-size: 16px; font-weight: 800; color: #FFDF00; }
    /* Empty */
    .empty {
      text-align: center;
      padding: 50px 24px;
      color: #555;
    }
    .empty .icon {
      font-size: 18px;
      font-weight: 800;
      color: #FFDF00;
      background: #016443;
      width: 52px;
      height: 52px;
      line-height: 52px;
      border-radius: 8px;
      margin: 0 auto 14px;
    }
    .empty p {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.6;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 data-i18n="title">MAX STAKE LOG</h1>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn" id="lang-en" data-lang="en">EN</button>
        <button class="lang-btn" id="lang-pt" data-lang="pt">PT</button>
      </div>
      <span class="count" id="count">0</span>
    </div>
  </div>
  <div class="stats" id="stats" style="display:none;">
    <div class="stat">
      <div class="stat-label" data-i18n="highest">Highest</div>
      <div class="stat-value" id="stat-max">—</div>
    </div>
    <div class="stat">
      <div class="stat-label" data-i18n="lowest">Lowest</div>
      <div class="stat-value" id="stat-min">—</div>
    </div>
    <div class="stat">
      <div class="stat-label" data-i18n="average">Average</div>
      <div class="stat-value" id="stat-avg">—</div>
    </div>
  </div>
  <div class="controls">
    <button id="btn-show" class="btn-primary" data-i18n="overlay">Overlay</button>
    <button id="btn-export" class="btn-secondary" data-i18n="export">Export CSV</button>
    <button id="btn-clear" class="btn-danger" data-i18n="clear">Clear</button>
  </div>
  <div class="log-list" id="log-list"></div>
  <script src="popup.js"></script>
</body>
</html>
